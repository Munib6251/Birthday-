<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday My Love</title>

<style>
body{
    background:pink;
    text-align:center;
    font-family:Arial;
    overflow:hidden;
    margin:0;
    padding:0;
}

h1{
    color:red;
}

.heart{
    position:fixed;
    color:red;
    font-size:20px;
    animation:fall 5s linear infinite;
}

@keyframes fall{
    0%{transform:translateY(-10vh);}
    100%{transform:translateY(110vh);}
}

button{
    padding:12px 25px;
    font-size:18px;
    background:red;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
</style>

<script>
// 🔒 Password Protection
function checkPassword(){
    let password = prompt("Enter Password to Open 🎁");
    if(password === "love123"){  // Change your password here
        document.getElementById("content").style.display = "block";
        startBackgroundMusic();
    } else {
        alert("Wrong Password! ❌");
        window.location.reload();
    }
}

// 🎵 Background Music
function startBackgroundMusic(){
    let audio = document.getElementById("mysong");
    let playPromise = audio.play();
    if (playPromise !== undefined) {
        playPromise.catch(error => {
            console.log("Autoplay blocked, user interaction needed.");
        });
    }
}

// 💥 Firework Function
function firework(){
    for(let i=0;i<20;i++){
        let f=document.createElement("div");
        f.innerHTML="🎆";
        f.style.position="fixed";
        f.style.left=Math.random()*100+"%";
        f.style.top=Math.random()*100+"%";
        f.style.fontSize="30px";
        document.body.appendChild(f);
        setTimeout(()=>{f.remove()},1000);
    }
}

// ❤️ Heart Animation
setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"%";
    document.body.appendChild(h);
    setTimeout(()=>{h.remove()},5000);
},300);

// 💌 Surprise Button
function love(){
    alert("I Love You So Much ❤️");
    firework();
}
</script>

</head>

<body onload="checkPassword()">

<!-- Main Content Hidden Until Correct Password -->
<div id="content" style="display:none;">

<h1>Happy Birthday My Love 🎂</h1>

<p>তোমাকে জন্মদিনের অনেক অনেক শুভেচ্ছা ❤️</p>
<p>তুমি আমার জীবনের সবচেয়ে সুন্দর মানুষ।</p>

<button onclick="love()">Click For Surprise 💌</button>

<br><br>

<!-- Background Music -->
<audio id="mysong" loop>
    <source src="birthday.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
</audio>

</div>

</body>
</html>
